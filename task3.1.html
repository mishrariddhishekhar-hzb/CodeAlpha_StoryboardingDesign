<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORYBOARD STUDIO — Remix</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0b021a;
    --bg2:     #1c0635;
    --panel:   #170a2e;
    --card:    #1f0f3a;
    --pink:    #ff2ebc;
    --purple:  #b15bff;
    --cyan:    #00f0ff;
    --lime:    #ccff33;
    --yellow:  #ffe347;
    --orange:  #ff6b35;
    --blue:    #4d7cff;
    --ink:     #fdfbff;
    --grey:    #b7a9d6;
    --lgrey:   #3a2a5c;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── ANIMATED BACKDROP ──────────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,46,188,0.25), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(0,240,255,0.2), transparent 40%),
      radial-gradient(circle at 50% 80%, rgba(177,91,255,0.25), transparent 45%);
    z-index: -2;
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(3%, -2%) scale(1.08); }
    100% { transform: translate(-2%, 3%) scale(1.04); }
  }

  .grain {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  }

  /* floating emoji stickers */
  .sticker {
    position: fixed;
    font-size: 26px;
    opacity: 0.18;
    z-index: -1;
    animation: floaty 12s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(12deg); }
  }

  /* ── TOP BAR ─────────────────────────────────────────────── */
  .topbar {
    background: rgba(11,2,26,0.85);
    backdrop-filter: blur(10px);
    color: var(--ink);
    padding: 16px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, var(--pink), var(--cyan), var(--lime)) 1;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-mark {
    width: 46px; height: 46px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--cyan));
    background-size: 200% 200%;
    animation: gradshift 5s ease infinite;
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--bg);
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(255,46,188,0.5);
  }
  @keyframes gradshift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .brand-text h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.02em;
    line-height: 1;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand-text p {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--grey);
    margin-top: 4px;
    text-transform: uppercase;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .runtime-pill {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--lgrey);
    border-radius: 999px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .runtime-pill b { color: var(--lime); font-size: 14px; }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    background: var(--card);
    color: var(--ink);
    padding: 11px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    border: 1px solid var(--lgrey);
  }
  .btn:hover { transform: translateY(-3px) scale(1.04); border-color: var(--cyan); box-shadow: 0 6px 18px rgba(0,240,255,0.25); }
  .btn:active { transform: translateY(0) scale(0.97); }
  .btn.primary {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    box-shadow: 0 4px 18px rgba(255,46,188,0.4);
  }
  .btn.primary:hover { box-shadow: 0 8px 26px rgba(255,46,188,0.55); }
  .btn.sound { padding: 11px 14px; }
  .btn.sound.muted { opacity: 0.45; }

  /* ── MAIN LAYOUT ─────────────────────────────────────────── */
  main {
    max-width: 1480px;
    margin: 0 auto;
    padding: 36px 26px 100px;
    position: relative;
    z-index: 1;
  }

  .intro-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .intro-row h2 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 40px;
    letter-spacing: 0.01em;
    line-height: 1;
  }
  .intro-row h2 span {
    background: linear-gradient(90deg, var(--lime), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .intro-row p {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--grey);
    letter-spacing: 0.15em;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--grey);
    background: var(--panel);
    border: 1px solid var(--lgrey);
    border-radius: 999px;
    padding: 6px 12px;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
  }

  /* ── FRAME GRID ──────────────────────────────────────────── */
  #frame-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 26px;
  }

  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.7) translateY(30px) rotate(-3deg); }
    60%  { opacity: 1; transform: scale(1.04) translateY(-4px) rotate(1deg); }
    100% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
  }
  @keyframes shakeOut {
    0%   { transform: scale(1) rotate(0deg); opacity: 1; }
    20%  { transform: scale(1.02) rotate(-3deg); }
    40%  { transform: scale(1.02) rotate(3deg); }
    60%  { transform: scale(0.96) rotate(-2deg); }
    100% { transform: scale(0.4) rotate(8deg) translateY(40px); opacity: 0; }
  }

  .cel {
    background: var(--card);
    border: 1px solid var(--lgrey);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease, border-color 0.25s;
    position: relative;
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  .cel.removing { animation: shakeOut 0.4s ease forwards; pointer-events: none; }

  .cel:hover {
    transform: translateY(-6px) rotate(-0.6deg) scale(1.015);
    border-color: var(--cyan);
    box-shadow: 0 16px 40px rgba(177,91,255,0.35), 0 0 0 1px rgba(0,240,255,0.3);
  }

  /* Visual area */
  .cel-visual {
    aspect-ratio: 16/9;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: filter 0.25s;
  }
  .cel-visual::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.35) 100%);
  }
  .cel:hover .cel-visual { filter: saturate(1.3) brightness(1.08); }

  .cel-visual svg { width: 56%; height: 56%; opacity: 0.95; position: relative; z-index: 1; transition: transform 0.3s ease; }
  .cel:hover .cel-visual svg { transform: scale(1.12) rotate(4deg); }

  .cel-num {
    position: absolute;
    top: 10px; left: 12px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: rgba(255,255,255,0.95);
    z-index: 2;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .cel-timecode {
    position: absolute;
    bottom: 10px; right: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.05em;
    z-index: 2;
  }

  .cel-controls {
    position: absolute;
    top: 10px; right: 10px;
    display: flex;
    gap: 6px;
    z-index: 3;
  }
  .icon-btn {
    width: 28px; height: 28px;
    border: none;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: transform 0.15s, background 0.15s;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.75); transform: scale(1.15); }
  .icon-btn.danger:hover { background: var(--pink); }

  /* Body / form area */
  .cel-body {
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .field-row { display: flex; gap: 8px; }
  .field-half { flex: 1; }

  .cel-body label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.18em;
    color: var(--grey);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .cel-body input,
  .cel-body select,
  .cel-body textarea {
    width: 100%;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    border: 1px solid var(--lgrey);
    border-radius: 8px;
    background: var(--panel);
    color: var(--ink);
    padding: 8px 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .cel-body input:focus,
  .cel-body select:focus,
  .cel-body textarea:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,240,255,0.15);
  }
  .cel-body select { color: var(--ink); }
  .cel-body option { background: var(--panel); color: var(--ink); }

  .title-input {
    font-family: 'Unbounded', sans-serif !important;
    font-weight: 700 !important;
    font-size: 17px !important;
    letter-spacing: 0.01em;
    border: none !important;
    padding: 2px 0 !important;
    border-bottom: 1px solid var(--lgrey) !important;
    border-radius: 0 !important;
    background: transparent !important;
  }
  .title-input:focus { border-bottom: 1px solid var(--pink) !important; box-shadow: none !important; }

  .desc-input {
    resize: vertical;
    min-height: 56px;
    font-size: 12px;
    line-height: 1.6;
  }

  /* ── ADD CARD ────────────────────────────────────────────── */
  .add-cel {
    border: 2px dashed var(--lgrey);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
    min-height: 280px;
    background: transparent;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    font-family: 'Space Mono', monospace;
  }
  .add-cel:hover {
    border-color: var(--lime);
    background: rgba(204,255,51,0.06);
    transform: scale(1.02) rotate(0.5deg);
    box-shadow: 0 0 30px rgba(204,255,51,0.15);
  }
  .add-cel .plus {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: var(--lgrey);
    line-height: 1;
    transition: color 0.2s, transform 0.3s;
  }
  .add-cel:hover .plus { color: var(--lime); transform: rotate(90deg) scale(1.2); }
  .add-cel span {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--grey);
    text-transform: uppercase;
  }

  /* confetti */
  .confetti {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    z-index: 300;
    pointer-events: none;
    animation: confettiFall 1s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(180px) rotate(360deg) scale(0.4); opacity: 0; }
  }

  /* ── PLAY MODE OVERLAY ───────────────────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,1,15,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    padding: 30px;
  }
  .overlay.active { display: flex; }

  .stage {
    width: min(900px, 90vw);
    aspect-ratio: 16/9;
    border-radius: 22px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 60px rgba(177,91,255,0.4);
    transition: background 0.4s ease;
  }
  .stage::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.4) 100%);
  }
  .stage svg {
    width: 38%; height: 38%; opacity: 0.95; position: relative; z-index: 1;
    animation: stagePulse 2.4s ease-in-out infinite;
  }
  @keyframes stagePulse {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.08) rotate(-2deg); }
  }

  @keyframes frameSlide {
    0% { opacity: 0; transform: scale(0.9) translateX(40px); }
    100% { opacity: 1; transform: scale(1) translateX(0); }
  }
  .stage.transitioning svg, .stage.transitioning .stage-num, .stage.transitioning .stage-tag {
    animation: frameSlide 0.4s cubic-bezier(.34,1.56,.64,1);
  }

  .stage-num {
    position: absolute;
    top: 18px; left: 20px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 42px;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    z-index: 2;
  }
  .stage-tag {
    position: absolute;
    top: 22px; right: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--bg);
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 700;
    z-index: 2;
  }

  .stage-caption {
    width: min(900px, 90vw);
    margin-top: 20px;
    color: var(--ink);
    text-align: left;
  }
  .stage-caption h3 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 800;
    font-size: 26px;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .stage-caption p {
    font-size: 14px;
    color: var(--grey);
    line-height: 1.7;
    max-width: 700px;
  }

  .progress-track {
    width: min(900px, 90vw);
    height: 6px;
    background: var(--card);
    margin-top: 22px;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--cyan), var(--lime));
    width: 0%;
    transition: width 0.05s linear;
    box-shadow: 0 0 12px rgba(255,46,188,0.6);
  }

  .stage-controls {
    margin-top: 22px;
    display: flex;
    gap: 12px;
    align-items: center;
    width: min(900px, 90vw);
  }
  .stage-counter {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--grey);
    letter-spacing: 0.1em;
  }

  /* ── EMPTY STATE ─────────────────────────────────────────── */
  .empty-msg {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    font-family: 'Space Mono', monospace;
    color: var(--grey);
    letter-spacing: 0.15em;
    font-size: 12px;
    border: 2px dashed var(--lgrey);
    border-radius: 18px;
  }

  @media (max-width: 640px) {
    .topbar { padding: 14px; }
    .intro-row h2 { font-size: 30px; }
    main { padding: 24px 14px 80px; }
  }
</style>
</head>
<body>

<div class="grain"></div>
<div class="sticker" style="top:8%; left:6%;">✨</div>
<div class="sticker" style="top:55%; left:88%; animation-delay:3s;">🔥</div>
<div class="sticker" style="top:80%; left:12%; animation-delay:6s;">🎬</div>
<div class="sticker" style="top:30%; left:92%; animation-delay:1.5s;">💫</div>
<div class="sticker" style="top:70%; left:50%; animation-delay:4.5s;">👀</div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">SB</div>
    <div class="brand-text">
      <h1>STORYBOARD STUDIO</h1>
      <p>main character energy · frame by frame</p>
    </div>
  </div>
  <div class="toolbar">
    <div class="runtime-pill">
      RUNTIME&nbsp;<b id="total-runtime">0:00</b>&nbsp;·&nbsp;<span id="frame-count">0</span>&nbsp;FRAMES
    </div>
    <button class="btn sound" id="sound-btn" title="Toggle sound">🔊</button>
    <button class="btn" id="export-btn">⬇ Export</button>
    <button class="btn primary" id="play-btn">▶ Play it</button>
  </div>
</div>

<main>
  <div class="intro-row">
    <div>
      <h2>Your <span>Storyboard</span></h2>
      <p>edit live · drag the vibes into order · hit play for the full sequence</p>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div id="frame-grid"></div>
</main>

<div class="overlay" id="overlay">
  <div class="stage" id="stage">
    <div class="stage-num" id="stage-num"></div>
    <div class="stage-tag" id="stage-tag"></div>
    <div id="stage-visual"></div>
  </div>
  <div class="stage-caption">
    <h3 id="stage-title"></h3>
    <p id="stage-desc"></p>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="stage-controls">
    <button class="btn" id="prev-btn">‹ Prev</button>
    <button class="btn primary" id="pause-btn">❙❙ Pause</button>
    <button class="btn" id="next-btn">Next ›</button>
    <span class="stage-counter" id="stage-counter"></span>
    <button class="btn" id="close-btn" style="margin-left:auto;">✕ Close</button>
  </div>
</div>

<script>
  // ── AUDIO ENGINE (Web Audio API, no files needed) ───────────
  let actx = null;
  let soundOn = true;

  function getCtx() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    return actx;
  }

  function tone(freq, dur, type='sine', vol=0.18, delay=0) {
    if (!soundOn) return;
    const ctx = getCtx();
    const t0 = ctx.currentTime + delay;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur);
  }

  const sfx = {
    click:  () => tone(720, 0.06, 'square', 0.12),
    add:    () => { tone(523, 0.09, 'triangle', 0.18); tone(784, 0.14, 'triangle', 0.15, 0.07); },
    remove: () => { tone(300, 0.18, 'sawtooth', 0.12); tone(180, 0.22, 'sawtooth', 0.1, 0.05); },
    move:   () => tone(500, 0.05, 'square', 0.08),
    play:   () => { tone(392, 0.1, 'triangle', 0.15); tone(523, 0.1, 'triangle', 0.15, 0.08); tone(659, 0.16, 'triangle', 0.15, 0.16); },
    next:   () => tone(880, 0.08, 'sine', 0.13),
    pause:  () => tone(440, 0.1, 'sine', 0.12),
    close:  () => { tone(659, 0.08, 'triangle', 0.13); tone(440, 0.12, 'triangle', 0.12, 0.06); },
  };

  document.getElementById('sound-btn').addEventListener('click', (e) => {
    soundOn = !soundOn;
    e.currentTarget.textContent = soundOn ? '🔊' : '🔇';
    e.currentTarget.classList.toggle('muted', !soundOn);
    if (soundOn) tone(660, 0.08, 'sine', 0.1);
  });

  // ── CONFETTI ─────────────────────────────────────────────────
  const CONFETTI_COLORS = ['#ff2ebc','#00f0ff','#ccff33','#b15bff','#ffe347','#ff6b35'];
  function burstConfetti(x, y) {
    for (let i = 0; i < 14; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = x + 'px';
      c.style.top = y + 'px';
      c.style.background = CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
      c.style.transform = `translateX(${(Math.random()-0.5)*120}px)`;
      c.style.animationDuration = (0.7 + Math.random()*0.6) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1400);
    }
  }

  // ── SHOT TYPES / VISUAL LIBRARY ─────────────────────────────
  const SHOT_TYPES = {
    WS:  { name: 'Wide Shot',        color: '#00b8d4' },
    MS:  { name: 'Medium Shot',      color: '#7c4dff' },
    CU:  { name: 'Close-Up',         color: '#ff2ebc' },
    ECU: { name: 'Extreme Close-Up', color: '#ff6b35' },
    OTS: { name: 'Over-the-Shoulder', color: '#8bc34a' },
    POV: { name: 'Point of View',    color: '#ffd60a' },
    AERIAL: { name: 'Aerial / Drone', color: '#4d7cff' },
  };

  const TAGS = ['Establishing', 'Action', 'Dialogue', 'Transition', 'Reaction', 'Resolution', 'UX Flow'];

  function shotSvg(shotKey) {
    switch(shotKey) {
      case 'WS':
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="55" width="88" height="35" fill="#ffffff" opacity="0.18"/>
          <rect x="20" y="30" width="14" height="60" fill="#ffffff" opacity="0.3"/>
          <rect x="42" y="15" width="18" height="75" fill="#ffffff" opacity="0.35"/>
          <rect x="66" y="35" width="16" height="55" fill="#ffffff" opacity="0.26"/>
          <circle cx="80" cy="18" r="8" fill="#ffffff" opacity="0.4"/>
        </svg>`;
      case 'MS':
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="30" y="40" width="40" height="50" rx="10" fill="#ffffff" opacity="0.32"/>
          <circle cx="50" cy="28" r="16" fill="#ffffff" opacity="0.4"/>
          <rect x="10" y="86" width="80" height="3" fill="#ffffff" opacity="0.22"/>
        </svg>`;
      case 'CU':
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="34" fill="#ffffff" opacity="0.3"/>
          <circle cx="40" cy="44" r="5" fill="#ffffff" opacity="0.7"/>
          <circle cx="60" cy="44" r="5" fill="#ffffff" opacity="0.7"/>
          <path d="M38 62 Q50 72 62 62" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
        </svg>`;
      case 'ECU':
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="50" cy="50" rx="38" ry="26" fill="#ffffff" opacity="0.24"/>
          <circle cx="50" cy="50" r="14" fill="#ffffff" opacity="0.5"/>
          <circle cx="50" cy="50" r="6" fill="#ffffff" opacity="0.85"/>
        </svg>`;
      case 'OTS':
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="68" r="22" fill="#ffffff" opacity="0.38"/>
          <circle cx="72" cy="34" r="16" fill="#ffffff" opacity="0.24"/>
          <line x1="40" y1="55" x2="64" y2="42" stroke="#ffffff" stroke-width="2" opacity="0.45" stroke-dasharray="3 3"/>
        </svg>`;
      case 'POV':
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 50 Q50 18 90 50 Q50 82 10 50 Z" fill="#ffffff" opacity="0.24"/>
          <circle cx="50" cy="50" r="14" fill="#ffffff" opacity="0.55"/>
          <circle cx="50" cy="50" r="6" fill="#ffffff" opacity="0.9"/>
        </svg>`;
      case 'AERIAL':
        return `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="14" y="14" width="30" height="30" fill="#ffffff" opacity="0.24"/>
          <rect x="56" y="14" width="30" height="20" fill="#ffffff" opacity="0.32"/>
          <rect x="14" y="56" width="22" height="30" fill="#ffffff" opacity="0.3"/>
          <rect x="50" y="46" width="36" height="40" fill="#ffffff" opacity="0.2"/>
          <line x1="0" y1="50" x2="100" y2="50" stroke="#ffffff" stroke-width="1" opacity="0.18"/>
          <line x1="50" y1="0" x2="50" y2="100" stroke="#ffffff" stroke-width="1" opacity="0.18"/>
        </svg>`;
      default:
        return '';
    }
  }

  // ── STATE ────────────────────────────────────────────────────
  let frames = [
    { id: cid(), shot: 'WS',  title: 'City at Night',     desc: 'Wide establishing shot. The city glitters below as ambient music swells — this is where the story begins.', dur: 4, tag: 'Establishing' },
    { id: cid(), shot: 'CU',  title: 'First Reaction',    desc: 'Extreme close-up on the protagonist\'s face. Eyes widen — a moment of realization before the silence breaks.', dur: 3, tag: 'Reaction' },
    { id: cid(), shot: 'MS',  title: 'The Chase Begins',  desc: 'Dynamic tracking shot. Motion blur and speed lines as the protagonist runs through narrow corridors.', dur: 7, tag: 'Action' },
    { id: cid(), shot: 'OTS', title: 'Past vs Present',   desc: 'Split-screen transition. Left holds the memory, right holds reality — the divide tells the story.', dur: 4, tag: 'Transition' },
    { id: cid(), shot: 'AERIAL', title: 'Confrontation',  desc: 'Two-shot dialogue scene. Characters face each other; tension builds with every beat of silence.', dur: 10, tag: 'Dialogue' },
    { id: cid(), shot: 'POV', title: 'Dawn / Fade Out',   desc: 'Wide shot at sunrise. The protagonist stands at the horizon as warm light floods the frame.', dur: 7, tag: 'Resolution' },
  ];

  function cid() { return 'f' + Math.random().toString(36).slice(2, 9); }

  // ── RENDER ───────────────────────────────────────────────────
  const grid = document.getElementById('frame-grid');

  function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.round(sec % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  function render() {
    grid.innerHTML = '';

    if (frames.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-msg';
      empty.textContent = 'NOTHING HERE YET — HIT "ADD FRAME" TO START THE STORY';
      grid.appendChild(empty);
    }

    let cumulative = 0;
    frames.forEach((f, i) => {
      const startTime = cumulative;
      cumulative += Number(f.dur) || 0;

      const cel = document.createElement('div');
      cel.className = 'cel';
      cel.style.animationDelay = (i * 0.06) + 's';

      const shotInfo = SHOT_TYPES[f.shot] || SHOT_TYPES.WS;

      cel.innerHTML = `
        <div class="cel-visual" style="background:${shotInfo.color}">
          <div class="cel-num">0${i+1}</div>
          <div class="cel-controls">
            <button class="icon-btn" data-action="up" title="Move left">‹</button>
            <button class="icon-btn" data-action="down" title="Move right">›</button>
            <button class="icon-btn danger" data-action="delete" title="Delete frame">✕</button>
          </div>
          ${shotSvg(f.shot)}
          <div class="cel-timecode">${fmtTime(startTime)} – ${fmtTime(cumulative)}</div>
        </div>
        <div class="cel-body">
          <input class="title-input" data-field="title" value="${escapeHtml(f.title)}" placeholder="Scene title">
          <textarea class="desc-input" data-field="desc" placeholder="Describe the action, framing, mood...">${escapeHtml(f.desc)}</textarea>
          <div class="field-row">
            <div class="field-half">
              <label>Shot Type</label>
              <select data-field="shot">
                ${Object.entries(SHOT_TYPES).map(([k,v]) => `<option value="${k}" ${k===f.shot?'selected':''}>${k} — ${v.name}</option>`).join('')}
              </select>
            </div>
            <div class="field-half">
              <label>Tag</label>
              <select data-field="tag">
                ${TAGS.map(t => `<option value="${t}" ${t===f.tag?'selected':''}>${t}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field-half">
              <label>Duration (seconds)</label>
              <input type="number" min="1" max="120" data-field="dur" value="${f.dur}">
            </div>
          </div>
        </div>
      `;

      // bind field changes
      cel.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('input', () => {
          const field = el.dataset.field;
          f[field] = field === 'dur' ? (Number(el.value) || 1) : el.value;
          if (field === 'shot' || field === 'dur') render();
          else updateRuntime();
        });
        el.addEventListener('change', () => { if (el.tagName === 'SELECT') sfx.click(); });
      });

      // controls
      cel.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
        sfx.remove();
        cel.classList.add('removing');
        setTimeout(() => {
          frames = frames.filter(x => x.id !== f.id);
          render();
        }, 380);
      });
      cel.querySelector('[data-action="up"]').addEventListener('click', () => {
        if (i > 0) { sfx.move(); [frames[i-1], frames[i]] = [frames[i], frames[i-1]]; render(); }
      });
      cel.querySelector('[data-action="down"]').addEventListener('click', () => {
        if (i < frames.length - 1) { sfx.move(); [frames[i+1], frames[i]] = [frames[i], frames[i+1]]; render(); }
      });

      grid.appendChild(cel);
    });

    // Add card
    const addCel = document.createElement('div');
    addCel.className = 'add-cel';
    addCel.innerHTML = `<div class="plus">+</div><span>Add Frame</span>`;
    addCel.addEventListener('click', (e) => addFrame(e));
    grid.appendChild(addCel);

    updateRuntime();
    renderLegend();
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function addFrame(e) {
    sfx.add();
    frames.push({ id: cid(), shot: 'MS', title: 'New Scene', desc: 'Describe what happens in this frame...', dur: 4, tag: 'Action' });
    render();
    if (e) burstConfetti(e.clientX, e.clientY);
  }

  function updateRuntime() {
    const total = frames.reduce((sum, f) => sum + (Number(f.dur) || 0), 0);
    document.getElementById('total-runtime').textContent = fmtTime(total);
    document.getElementById('frame-count').textContent = frames.length;
  }

  function renderLegend() {
    const used = [...new Set(frames.map(f => f.shot))];
    const legend = document.getElementById('legend');
    legend.innerHTML = used.map(k => {
      const s = SHOT_TYPES[k];
      return `<div class="legend-item" style="color:${s.color}"><span class="legend-dot" style="background:${s.color}"></span>${k} · ${s.name}</div>`;
    }).join('');
  }

  // ── EXPORT ───────────────────────────────────────────────────
  document.getElementById('export-btn').addEventListener('click', () => {
    sfx.click();
    const data = JSON.stringify(frames.map((f,i)=>({...f, order:i+1})), null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'storyboard-sequence.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  // ── PLAY MODE ────────────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  const stageVisual = document.getElementById('stage-visual');
  const stageNum = document.getElementById('stage-num');
  const stageTag = document.getElementById('stage-tag');
  const stageTitle = document.getElementById('stage-title');
  const stageDesc = document.getElementById('stage-desc');
  const progressFill = document.getElementById('progress-fill');
  const stageCounter = document.getElementById('stage-counter');
  const stage = document.getElementById('stage');

  let playIndex = 0;
  let progressTimer = null;
  let isPaused = false;
  let elapsed = 0;

  function showFrame(idx, withSound) {
    if (frames.length === 0) return;
    playIndex = (idx + frames.length) % frames.length;
    const f = frames[playIndex];
    const shotInfo = SHOT_TYPES[f.shot] || SHOT_TYPES.WS;
    stage.style.background = shotInfo.color;
    stageVisual.innerHTML = shotSvg(f.shot);
    stageNum.textContent = '0' + (playIndex+1);
    stageTag.textContent = f.shot + ' · ' + f.tag;
    stageTitle.textContent = f.title;
    stageDesc.textContent = f.desc;
    stageCounter.textContent = (playIndex+1) + ' / ' + frames.length + '  ·  ' + f.dur + 's';
    elapsed = 0;
    progressFill.style.width = '0%';
    stage.classList.remove('transitioning');
    requestAnimationFrame(() => stage.classList.add('transitioning'));
    if (withSound) sfx.next();
  }

  function startProgress() {
    clearInterval(progressTimer);
    const f = frames[playIndex];
    const total = (Number(f.dur)||1) * 1000;
    progressTimer = setInterval(() => {
      if (isPaused) return;
      elapsed += 50;
      progressFill.style.width = Math.min(100, (elapsed/total)*100) + '%';
      if (elapsed >= total) {
        clearInterval(progressTimer);
        showFrame(playIndex+1, true);
        startProgress();
      }
    }, 50);
  }

  document.getElementById('play-btn').addEventListener('click', () => {
    if (frames.length === 0) return;
    sfx.play();
    overlay.classList.add('active');
    isPaused = false;
    document.getElementById('pause-btn').textContent = '❙❙ Pause';
    showFrame(0, false);
    startProgress();
  });

  document.getElementById('pause-btn').addEventListener('click', () => {
    isPaused = !isPaused;
    sfx.pause();
    document.getElementById('pause-btn').textContent = isPaused ? '▶ Resume' : '❙❙ Pause';
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    clearInterval(progressTimer);
    showFrame(playIndex+1, true);
    startProgress();
  });
  document.getElementById('prev-btn').addEventListener('click', () => {
    clearInterval(progressTimer);
    showFrame(playIndex-1, true);
    startProgress();
  });
  document.getElementById('close-btn').addEventListener('click', () => {
    sfx.close();
    overlay.classList.remove('active');
    clearInterval(progressTimer);
  });

  // initial render
  render();
</script>
</body>
</html>
